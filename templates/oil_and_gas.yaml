# Sector template: Oil & Gas (E&P)
# Defines the sector's operational drivers, the per-asset structure and the
# operational -> financial mapping. The engine uses this file to build the input
# tabs and, later, the Operational Model tab. v0.1, evolves during the Prio pilot.

sector: oil_and_gas
currency_note: "company's reporting currency; confirm at setup (Prio reports in USD, confirm)"

asset_structure:
  granular_by: production field/cluster
  max_assets: 8
  collapse_rule: "if the company only discloses consolidated figures, use a single 'Consolidated' block"

operational_inputs:
  - id: production_boed
    label: "Production (kboe/d)"
    per_asset: true
    annual_agg: average
  - id: sales_volume
    label: "Sales volume (kboe)"
    per_asset: false
    annual_agg: sum
  - id: realized_price
    label: "Realized price (USD/boe)"
    per_asset: false
    annual_agg: average   # engine will compute a volume-weighted average
  - id: brent_avg
    label: "Brent average (USD/bbl)"
    per_asset: false
    annual_agg: average
    shared_macro: true    # candidate for the shared macro assumptions file
  - id: lifting_cost
    label: "Lifting cost (USD/boe)"
    per_asset: true
    annual_agg: average
  - id: royalties
    label: "Royalties and government take (USD mn)"
    per_asset: false
    annual_agg: sum
  - id: capex
    label: "Capex (USD mn)"
    per_asset: true
    annual_agg: sum
  - id: fx_brlusd_avg
    label: "BRL/USD average"
    per_asset: false
    annual_agg: average
    shared_macro: true
  - id: reserves_1p_2p_3p
    label: "Reserves 1P / 2P / 3P (mmboe)"
    per_asset: false
    periodicity: annual_only
    annual_agg: eop

links_to_financials:
  - driver: [production_boed, realized_price]
    target: "IS / Net revenue"
    relation: "volume sold x realized price (production -> sales bridge via inventory/offtake)"
  - driver: [production_boed, lifting_cost]
    target: "IS / Cost of goods sold (lifting portion)"
  - driver: [royalties]
    target: "IS / Cost of goods sold (government portion) or a dedicated line, per the company's reporting"
  - driver: [capex]
    target: "CF / Capex and BS / PP&E roll-forward"
  - driver: [reserves_1p_2p_3p]
    target: "depletion schedule (unit-of-production) in v2"

data_sources_user_provided:
  - "Earnings release and IR fundamentals spreadsheet"
  - "ITR/DFP and FRE (CVM filings)"
  - "ANP: monthly production by field (delivered ready by the user, converted to quarterly)"
