# Telecom — per-sector financial + operational DELTA over the universal base.
#
# The single MACHINE-READABLE source for the sector's extra required input labels. The method
# card (knowledge/sector_modeling_rules/sectors/telecom.md) links here; this YAML is never
# duplicated in card prose. Labels must match what engine/build_model_telecom.py hard-reads
# exactly (a mismatch is a build-time KeyError).
#
# Telecom keys its build off disclosed EBITDA + margin (not a per-expense build), carries the
# segment memo-revenue split, and reconstructs the cash bridge — hence the divergent delta.
# Universal base (shared by every sector) lives in engine/canonical_schema.py, not here.
required:
  Input Financials:
    - "(+/-) Net financial result"
    - "(-) Depreciation & amortization"
    - "(=) EBITDA (as disclosed)"
    - "(-) Operating expenses (ex-D&A)"
    - "memo: Mobile service revenue"
    - "memo: Fixed service revenue"
    - "memo: Product revenue"
    - "Provisions and ARO"
    - "(=) Net change in cash"
    - "Cash — beginning of period"
    - "Cash — end of period"
  Input Operational:
    - "Total lines"
    - "ARPU total"
    - "TIM Live clients"
    - "ARPU TIM Live"
    - "Capex"
