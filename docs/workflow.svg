<svg width="860" height="450" viewBox="0 0 860 450" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="450" fill="#ffffff"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Equity Model Copilot — workflow</text>

  <!-- row 1: preparation -->
  <g>
    <rect x="20" y="60" width="190" height="64" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="115" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">1. Clone the repo</text>
    <text x="115" y="96" text-anchor="middle" font-size="11" fill="#475569">and open Claude Code</text>
    <text x="115" y="110" text-anchor="middle" font-size="11" fill="#475569">in the folder</text>
  </g>
  <line x1="210" y1="92" x2="248" y2="92" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <g>
    <rect x="250" y="60" width="190" height="64" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="345" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">2. Drop in your data</text>
    <text x="345" y="96" text-anchor="middle" font-size="11" fill="#475569">financial and operational</text>
    <text x="345" y="110" text-anchor="middle" font-size="11" fill="#475569">spreadsheets in /inputs</text>
  </g>
  <line x1="440" y1="92" x2="478" y2="92" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <g>
    <rect x="480" y="60" width="190" height="64" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
    <text x="575" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#713f12">3. Input review</text>
    <text x="575" y="96" text-anchor="middle" font-size="11" fill="#475569">converted to the standard</text>
    <text x="575" y="110" text-anchor="middle" font-size="11" fill="#475569">layout, gaps and errors flagged</text>
  </g>
  <line x1="670" y1="92" x2="708" y2="92" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <g>
    <rect x="710" y="60" width="130" height="64" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="775" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Input ready</text>
    <text x="775" y="96" text-anchor="middle" font-size="11" fill="#475569">standardized</text>
    <text x="775" y="110" text-anchor="middle" font-size="11" fill="#475569">history</text>
  </g>

  <!-- arrow into the session -->
  <line x1="775" y1="124" x2="775" y2="156" stroke="#64748b" stroke-width="1.2"/>
  <line x1="775" y1="156" x2="448" y2="156" stroke="#64748b" stroke-width="1.2"/>
  <line x1="448" y1="156" x2="448" y2="182" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- line-by-line session -->
  <rect x="20" y="186" width="820" height="130" rx="10" fill="none" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="36" y="210" font-size="13" font-weight="700" fill="#1e3a8a">4. Line-by-line session (sequential, with pause and resume)</text>
  <g>
    <rect x="36" y="226" width="180" height="70" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <text x="126" y="245" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">Operational data</text>
    <text x="126" y="261" text-anchor="middle" font-size="10.5" fill="#475569">drivers, news, differing</text>
    <text x="126" y="275" text-anchor="middle" font-size="10.5" fill="#475569">viewpoints, 2-3 grounded</text>
    <text x="126" y="289" text-anchor="middle" font-size="10.5" fill="#475569">assumptions</text>
  </g>
  <line x1="216" y1="261" x2="252" y2="261" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <g>
    <rect x="254" y="226" width="180" height="70" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <text x="344" y="248" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">Structural discussions</text>
    <text x="344" y="264" text-anchor="middle" font-size="10.5" fill="#475569">debt, M&amp;A, organic vs.</text>
    <text x="344" y="278" text-anchor="middle" font-size="10.5" fill="#475569">inorganic growth, funding</text>
  </g>
  <line x1="434" y1="261" x2="470" y2="261" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <g>
    <rect x="472" y="226" width="170" height="70" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <text x="557" y="245" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">3 statements</text>
    <text x="557" y="261" text-anchor="middle" font-size="10.5" fill="#475569">line by line, assumption</text>
    <text x="557" y="275" text-anchor="middle" font-size="10.5" fill="#475569">per quarter and year,</text>
    <text x="557" y="289" text-anchor="middle" font-size="10.5" fill="#475569">time profile</text>
  </g>
  <line x1="642" y1="261" x2="678" y2="261" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <g>
    <rect x="680" y="226" width="144" height="70" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <text x="752" y="245" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">Valuation</text>
    <text x="752" y="261" text-anchor="middle" font-size="10.5" fill="#475569">WACC, DCF, multiples,</text>
    <text x="752" y="275" text-anchor="middle" font-size="10.5" fill="#475569">bull/base/bear</text>
    <text x="752" y="289" text-anchor="middle" font-size="10.5" fill="#475569">scenarios</text>
  </g>

  <!-- delivery -->
  <line x1="430" y1="316" x2="430" y2="348" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <g>
    <rect x="255" y="352" width="350" height="66" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
    <text x="430" y="374" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">5. Complete, auditable Excel</text>
    <text x="430" y="391" text-anchor="middle" font-size="11" fill="#475569">integrated tabs + inputs inside the file</text>
    <text x="430" y="406" text-anchor="middle" font-size="11" fill="#475569">+ assumption log with method and source</text>
  </g>
  <text x="430" y="440" text-anchor="middle" font-size="10" fill="#94a3b8">Every assumption logged with method, source and rationale. Estimates never become reported data. No investment recommendations.</text>
</svg>
