# The deterministic muscle of Fase 1 matching (label_resolver pass 2). Cross-language and
# report-variant spellings that the exact/normalized pass cannot catch live here. Entries are
# normalized at load (engine.canonical_schema.normalize), so accents/case/sign-prefix don't
# matter — list the natural spelling. AI-confirmed mappings are appended to a SEPARATE override
# layer (not this file) by alias_dictionary.add(); promote to this curated layer only on review.
